services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      DOMAIN_OR_HOST: ${DOMAIN_OR_HOST}
      ADMIN_USER_NAME: ${ADMIN_USER_NAME}
      ADMIN_USER_PASSWORD_HASH: ${ADMIN_USER_PASSWORD_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./generated/Caddy.users:/etc/caddy/Caddy.users:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - admin-ui
    networks:
      - edge

  admin-ui:
    image: ghcr.io/itsh-neumeier/mobileworkspace-linux/admin-ui:${ADMIN_UI_IMAGE_TAG:-latest}
    container_name: mobileworkspace-admin-ui
    restart: unless-stopped
    environment:
      MWC_PROJECT_ROOT: /workspace
      MWC_USERS_FILE: /workspace/users/users.json
      MWC_GENERATED_COMPOSE: /workspace/generated/docker-compose.users.yml
      MWC_GENERATED_CADDY: /workspace/generated/Caddy.users
      MWC_DOMAIN_OR_HOST: ${DOMAIN_OR_HOST}
      MWC_TIMEZONE: ${TIMEZONE:-Europe/Berlin}
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - edge

networks:
  edge:
  public_net:
  internal_net:
    internal: true

volumes:
  caddy_data:
  caddy_config:
