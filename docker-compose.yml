services:
  admin-ui:
    image: ghcr.io/itsh-neumeier/mobileworkspace-linux/admin-ui:${ADMIN_UI_IMAGE_TAG:-latest}
    container_name: mobileworkspace-admin-ui
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      MWC_PROJECT_ROOT: /workspace
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-admin}
      MWC_USERS_FILE: /workspace/users/users.json
      MWC_GENERATED_COMPOSE: /workspace/generated/docker-compose.users.yml
      MWC_GENERATED_PROXY: /workspace/generated/nginx.users.conf
      MWC_GENERATED_AUTH_DIR: /workspace/generated/auth
      MWC_BASE_COMPOSE: /workspace/base/docker-compose.base.yml
      MWC_DOMAIN_OR_HOST: ${DOMAIN_OR_HOST}
      MWC_TIMEZONE: ${TIMEZONE:-Europe/Berlin}
      MWC_PROVISIONER_MODE: ${MWC_PROVISIONER_MODE:-docker}
      MWC_EDGE_NETWORK: ${MWC_EDGE_NETWORK:-mobileworkspace_edge}
      MWC_PUBLIC_NETWORK: ${MWC_PUBLIC_NETWORK:-mobileworkspace_public_net}
      MWC_INTERNAL_NETWORK: ${MWC_INTERNAL_NETWORK:-mobileworkspace_internal_net}
      MWC_PROXMOX_API_URL: ${MWC_PROXMOX_API_URL:-}
      MWC_PROXMOX_NODE: ${MWC_PROXMOX_NODE:-}
      MWC_PROXMOX_TOKEN_ID: ${MWC_PROXMOX_TOKEN_ID:-}
      MWC_PROXMOX_TOKEN_SECRET: ${MWC_PROXMOX_TOKEN_SECRET:-}
      MWC_PROXMOX_TEMPLATE_VMID: ${MWC_PROXMOX_TEMPLATE_VMID:-}
      MWC_PROXMOX_VM_CORES: ${MWC_PROXMOX_VM_CORES:-2}
      MWC_PROXMOX_VM_MEMORY_MB: ${MWC_PROXMOX_VM_MEMORY_MB:-4096}
      MWC_PROXMOX_VM_DISK: ${MWC_PROXMOX_VM_DISK:-}
      MWC_PROXMOX_NET_BRIDGE: ${MWC_PROXMOX_NET_BRIDGE:-vmbr0}
      MWC_PROXMOX_VM_START_ON_CREATE: ${MWC_PROXMOX_VM_START_ON_CREATE:-true}
      MWC_PROXMOX_VERIFY_TLS: ${MWC_PROXMOX_VERIFY_TLS:-true}
      MWC_PROXY_CONTAINER_NAME: mobileworkspace-admin-ui
      ADMIN_USER_NAME: ${ADMIN_USER_NAME:-admin}
      MWC_ADMIN_FORCE_CHANGE_FILE: /workspace/bootstrap/admin-force-change
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - edge

networks:
  edge:
    name: ${MWC_EDGE_NETWORK:-mobileworkspace_edge}
  public_net:
    name: ${MWC_PUBLIC_NETWORK:-mobileworkspace_public_net}
  internal_net:
    name: ${MWC_INTERNAL_NETWORK:-mobileworkspace_internal_net}
    internal: true

volumes:
