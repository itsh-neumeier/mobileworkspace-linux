name: Container Smoke

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start stack
        run: |
          docker compose -f docker-compose.portainer.yml -f docker-compose.ci.yml up -d --build

      - name: Wait for web entrypoint
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:18080/ || true)
            if [ "$code" = "200" ]; then
              echo "Root endpoint is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Stack did not become ready in time"
          docker compose -f docker-compose.portainer.yml -f docker-compose.ci.yml logs
          exit 1

      - name: Verify admin route
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:18080/admin/ || true)
          if [ "$code" != "302" ] && [ "$code" != "200" ]; then
            echo "Unexpected /admin/ status: $code"
            docker compose -f docker-compose.portainer.yml -f docker-compose.ci.yml logs
            exit 1
          fi

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.portainer.yml -f docker-compose.ci.yml down -v
