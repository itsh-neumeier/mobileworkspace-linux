name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start stack
        run: |
          docker compose -f docker-compose.portainer.yml -f docker-compose.ci.yml up -d --build

      - name: Wait for web entrypoint
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:18080/ || true)
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.portainer.yml -f docker-compose.ci.yml logs
          exit 1

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.portainer.yml -f docker-compose.ci.yml down -v

  validate-and-package:
    needs: container-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate semantic version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if ! [[ "$TAG" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Tag $TAG is not valid semver"
            exit 1
          fi

      - name: Create release archive
        run: |
          mkdir dist
          tar --exclude='./.git' -czf "dist/mobile-web-console-${GITHUB_REF_NAME}.tar.gz" .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mobile-web-console-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
